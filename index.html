<script>
var passages = [
{
  num:"본문 1",
  title:"Kitchens on Wheels – Intro",
  fullText:"Buying food out of a vehicle is actually a long-standing American tradition.\n— Jaya Saxena\n\nA food truck is a large vehicle equipped to cook and sell food. Some sell frozen or prepackaged food; others have on-board kitchens and prepare food from scratch. Sandwiches, hamburgers, fries, and other regional fast food dishes are common. Food trucks have become a popular business in itself or a stepping stone to something bigger. They are also found in TV shows and movies.\n\nThe food trucks we see today seem quite new and contemporary. In fact, the history of the food truck is quite long. Eating in an indoor restaurant is actually a more recent concept than that of buying food from a temporary setup such as a cart or a truck. Americans have always been quite comfortable getting their food on the streets. Being nicknamed \"roach coaches,\" food trucks have been around for years in America. Here we take a look at how Texas chuck wagons, a keen Korean taco entrepreneur, and the gourmet boom helped secure their popularity and prospects.\n\n*Jaya Saxena (1986–) 미국 기자, 작가",
  sentences:[
  {
    eng:"Buying food out of a vehicle is actually a long-standing American tradition.",
    slash:"Buying food / out of a vehicle / is actually / a long-standing American tradition.",
    kr:"차량에서 음식을 사는 것은 / 사실 / 오랜 미국의 전통이다.",
    grammar:[
    {name:"동명사 주어 (Gerund Subject)",ex:"Buying food out of a vehicle is…",point:"동명사구가 문장의 주어 역할 → 단수 취급. 'is'가 동사임에 주목."},
    {name:"복합 형용사 long-standing",ex:"long-standing American tradition",point:"'long-standing'은 복합 형용사(하이픈 연결). 수능 어법 문제로 자주 출제."},
    ]
  },
  {
    eng:"A food truck is a large vehicle equipped to cook and sell food.",
    slash:"A food truck / is / a large vehicle / equipped to cook and sell food.",
    kr:"푸드트럭은 / 음식을 요리하고 판매하도록 장착된 / 대형 차량이다.",
    grammar:[
    {name:"과거분사 후치 수식",ex:"a large vehicle equipped to cook and sell food",point:"'equipped'는 vehicle을 뒤에서 수식하는 과거분사. equipped to V = ~하도록 갖추어진."},
    {name:"병렬 구조 (Parallel Structure)",ex:"to cook and sell food",point:"to부정사 하나에 두 동사(cook / sell)를 and로 연결. 수능 어법 단골 유형."},
    ]
  },
  {
    eng:"Some sell frozen or prepackaged food; others have on-board kitchens and prepare food from scratch.",
    slash:"Some sell frozen or prepackaged food; / others have on-board kitchens / and prepare food from scratch.",
    kr:"일부는 냉동 또는 미리 포장된 음식을 판매하고; / 다른 것들은 차내 주방을 갖추고 / 처음부터 음식을 준비한다.",
    grammar:[
    {name:"Some ~ others 대조 구문",ex:"Some sell…; others have…",point:"Some/others 대조 → 불특정 집합 분류. 글의 흐름 파악에 핵심."},
    {name:"관용 표현 from scratch",ex:"prepare food from scratch",point:"'from scratch'= 처음부터. 수능 문맥 어휘 문제로 출제 가능."},
    ]
  },
  {
    eng:"Food trucks have become a popular business in itself or a stepping stone to something bigger.",
    slash:"Food trucks / have become / a popular business in itself / or a stepping stone / to something bigger.",
    kr:"푸드트럭은 / 그 자체로 인기 있는 사업이 되었거나 / 더 큰 무언가를 향한 발판이 되었다.",
    grammar:[
    {name:"현재완료 (Present Perfect)",ex:"have become",point:"have + p.p. → 과거부터 현재까지의 변화·결과. 단순 과거(became)와 구별."},
    {name:"in itself / stepping stone",ex:"a popular business in itself",point:"'in itself'= 그 자체로. 'stepping stone'= 발판, 디딤돌. 비유적 표현 파악."},
    ]
  },
  {
    eng:"They are also found in TV shows and movies.",
    slash:"They / are also found / in TV shows and movies.",
    kr:"그것들은 / TV 쇼와 영화에서도 발견된다.",
    grammar:[
    {name:"수동태 (Passive Voice)",ex:"are found",point:"be + p.p. 수동 구조. 능동형은 'People find them in TV shows.' 수동·능동 전환 빈출."},
    ]
  },
  {
    eng:"The food trucks we see today seem quite new and contemporary.",
    slash:"The food trucks / we see today / seem / quite new and contemporary.",
    kr:"우리가 오늘날 보는 푸드트럭은 / 꽤 새롭고 현대적인 것처럼 보인다.",
    grammar:[
    {name:"관계절 목적격 생략 (Contact Clause)",ex:"the food trucks (that) we see today",point:"목적격 관계대명사 that/which 생략. 수능 어법 선택지 단골."},
    {name:"seem + 형용사",ex:"seem quite new and contemporary",point:"seem은 주격 보어(형용사) 취하는 연결 동사."},
    ]
  },
  {
    eng:"In fact, the history of the food truck is quite long.",
    slash:"In fact, / the history of the food truck / is / quite long.",
    kr:"사실, / 푸드트럭의 역사는 / 꽤 길다.",
    grammar:[

    ]
  },
  {
    eng:"Eating in an indoor restaurant is actually a more recent concept than that of buying food from a temporary setup such as a cart or a truck.",
    slash:"Eating in an indoor restaurant / is actually / a more recent concept / than that of buying food / from a temporary setup / such as a cart or a truck.",
    kr:"실내 식당에서 먹는 것은 / 사실 / 카트나 트럭 같은 임시 시설에서 음식을 사는 것보다 / 더 최근의 개념이다.",
    grammar:[
    {name:"비교급 구문: more ~ than",ex:"a more recent concept than that of…",point:"'that'은 앞의 'concept'를 대신하는 지시대명사. that/those 대명사 구별 빈출."},
    {name:"such as (예시 표현)",ex:"such as a cart or a truck",point:"such as = like(예를 들면). for example과의 용법 차이 이해."},
    ]
  },
  {
    eng:"Americans have always been quite comfortable getting their food on the streets.",
    slash:"Americans / have always been / quite comfortable / getting their food on the streets.",
    kr:"미국인들은 / 항상 / 길거리에서 음식을 구하는 것에 / 꽤 편안했다.",
    grammar:[
    {name:"be comfortable -ing",ex:"comfortable getting their food",point:"comfortable doing = ~하는 것을 편하게 여기다."},
    {name:"현재완료 + 빈도 부사",ex:"have always been",point:"always/ever/never 등 빈도 부사는 have와 p.p. 사이 위치. 어순 어법 출제."},
    ]
  },
  {
    eng:"Being nicknamed \"roach coaches,\" food trucks have been around for years in America.",
    slash:"Being nicknamed \"roach coaches,\" / food trucks / have been around / for years in America.",
    kr:"\"바퀴벌레 마차\"라는 별명으로 불리면서, / 푸드트럭은 / 미국에서 수년간 존재해 왔다.",
    grammar:[
    {name:"분사구문 수동 (Passive Participial Phrase)",ex:"Being nicknamed \"roach coaches,\"",point:"Being + p.p. = 수동 의미의 분사구문. 주어(food trucks)와의 관계 파악."},
    {name:"현재완료 지속 for + 기간",ex:"have been around for years",point:"for + 기간 → 현재완료 지속 용법. since + 시점과 구별."},
    ]
  },
  {
    eng:"Here we take a look at how Texas chuck wagons, a keen Korean taco entrepreneur, and the gourmet boom helped secure their popularity and prospects.",
    slash:"Here / we take a look at / how Texas chuck wagons, / a keen Korean taco entrepreneur, / and the gourmet boom / helped secure / their popularity and prospects.",
    kr:"여기서 우리는 / 텍사스 척 왜건, 열성적인 한국인 타코 사업가, 그리고 미식 붐이 / 어떻게 그것들의 인기와 전망을 확보하는 데 기여했는지 / 살펴볼 것이다.",

var currentPassage=0;
var currentTab={};

function goHome(){
  document.getElementById('cover').style.display='flex';
  document.getElementById('app').style.display='none';
}

function openPassage(idx){
  currentPassage=idx;
  document.getElementById('cover').style.display='none';
  document.getElementById('app').style.display='block';
  for(var i=0;i<5;i++){
    var el=document.getElementById('sb'+i);
    if(el) el.className=el.className.replace(' active','')+(i===idx?' active':'');
  }
  if(!currentTab[idx]) currentTab[idx]='tab-full';
  renderPassage(idx);
}

function switchTab(pidx,tabId){
  currentTab[pidx]=tabId;
  document.querySelectorAll('.tab-btn').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  var at=document.querySelector('[data-tab="'+tabId+'"]');
  var ac=document.getElementById(tabId);
  if(at) at.classList.add('active');
  if(ac) ac.classList.add('active');
}

function esc(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function nl2br(s){
  return esc(s).replace(/\n/g,'<br>');
}

function renderPassage(idx){
  var p=passages[idx];
  var mc=document.getElementById('main-content');
  var activeT=currentTab[idx]||'tab-full';
  var h='';
  h+='<div class="passage-header">';
  h+='<div class="p-num">'+esc(p.num)+'</div>';
  h+='<h2>'+esc(p.title)+'</h2>';
  h+='<div class="p-bar"></div></div>';

  var tabDefs=[
    {id:'tab-full',label:'① 전문'},
    {id:'tab-sent',label:'② 문장분석'},
    {id:'tab-vocab',label:'③ 핵심단어'},
    {id:'tab-trans',label:'④ 전문해석'},
    {id:'tab-topic',label:'⑤ 주제·요지'},
    {id:'tab-quiz',label:'⑥ 변형문제'}
  ];
  h+='<div class="tabs">';
  tabDefs.forEach(function(t){
    var act=t.id===activeT?' active':'';
    h+='<button class="tab-btn'+act+'" data-tab="'+t.id+'" onclick="switchTab('+idx+',this.dataset.tab)">'+t.label+'</button>';
  });
  h+='</div>';

  // TAB 1
  h+='<div class="tab-content'+(activeT==='tab-full'?' active':'')+'" id="tab-full">';
  h+='<div class="full-text-box">'+nl2br(p.fullText)+'</div>';
  h+='</div>';

  // TAB 2
  h+='<div class="tab-content'+(activeT==='tab-sent'?' active':'')+'" id="tab-sent">';
  p.sentences.forEach(function(s,si){
    h+='<div class="sent-block">';
    h+='<div class="sent-eng-box"><span class="sent-num">'+(si+1)+'</span><span class="sent-eng-text">'+esc(s.eng)+'</span></div>';
    h+='<div class="slash-box"><div class="slash-eng">'+esc(s.slash)+'</div><div class="slash-kr">'+esc(s.kr)+'</div></div>';
    h+='<div class="grammar-list">';
    s.grammar.forEach(function(g){
      h+='<div class="grammar-item"><span class="g-name">◆ '+esc(g.name)+'</span>';
      h+='<span class="g-ex">▶ '+esc(g.ex)+'</span>';
      h+='<span class="g-point">★ '+esc(g.point)+'</span></div>';
    });
    h+='</div></div>';
  });
  h+='</div>';

  // TAB 3
  h+='<div class="tab-content'+(activeT==='tab-vocab'?' active':'')+'" id="tab-vocab">';
  p.vocab.forEach(function(v){
    h+='<div class="vocab-item">';
    h+='<span class="vocab-word">'+esc(v.word)+'</span>';
    h+='<span class="vocab-meaning">'+esc(v.meaning)+'</span>';
    h+='<span class="vocab-pos">'+esc(v.pos)+'</span>';
    h+='<span class="vocab-deriv">'+esc(v.deriv)+'</span>';
    h+='</div>';
  });
  h+='</div>';

  // TAB 4
  h+='<div class="tab-content'+(activeT==='tab-trans'?' active':'')+'" id="tab-trans">';
  h+='<div class="translation-box">'+nl2br(p.translation)+'</div>';
  h+='</div>';

  // TAB 5
  h+='<div class="tab-content'+(activeT==='tab-topic'?' active':'')+'" id="tab-topic">';
  h+='<div class="topic-card"><div class="label">주제 (TOPIC)</div><div class="content">'+esc(p.topic.topic)+'</div></div>';
  h+='<div class="topic-card"><div class="label">요지 (MAIN IDEA)</div><div class="content">'+esc(p.topic.gist)+'</div></div>';
  h+='<div style="margin-top:16px;margin-bottom:8px;font-weight:700;color:#1a2744;font-size:0.9rem;">구조 흐름</div>';
  p.topic.structure.forEach(function(s,si){
    h+='<div class="structure-step"><div class="s-num">'+(si+1)+'</div>';
    h+='<div><div class="s-label">'+esc(s.label)+'</div><div class="s-desc">'+esc(s.desc)+'</div></div></div>';
  });
  h+='</div>';

  // TAB 6
  h+='<div class="tab-content'+(activeT==='tab-quiz'?' active':'')+'" id="tab-quiz">';
  p.quiz.forEach(function(q,qi){
    var qid='p'+idx+'q'+qi;
    h+='<div class="quiz-block">';
    h+='<div class="quiz-header"><span>['+esc(q.type)+']</span> '+q.qnum+'번</div>';
    h+='<div class="quiz-body">';
    h+='<div class="quiz-text">'+nl2br(q.question)+'</div>';
    if(q.passageABC){
      h+='<div class="abc-box">'+nl2br(q.passageABC)+'</div>';
    }
    h+='<ul class="options">';
    var circles=['①','②','③','④','⑤'];
    q.options.forEach(function(opt,oi){
      h+='<li><button id="'+qid+'opt'+oi+'" data-qid="'+qid+'" data-oi="'+oi+'" data-correct="'+q.answer+'" data-qi="'+qi+'" data-pidx="'+idx+'" onclick="selectOpt(this)">'+circles[oi]+' '+esc(opt)+'</button></li>';
    });
    h+='</ul>';
    h+='<div class="quiz-explain" id="'+qid+'exp">'+esc(q.explain)+'</div>';
    h+='<button class="quiz-reset" data-qid="'+qid+'" data-n="'+q.options.length+'" onclick="resetQuiz(this)">↺ 다시 풀기</button>';
    h+='</div></div>';
  });

  p.essay.forEach(function(e,ei){
    var eid='p'+idx+'e'+ei;
    h+='<div class="essay-block">';
    h+='<div class="essay-header"><span>[서술형 '+e.num+']</span></div>';
    h+='<div class="essay-body">';
    h+='<div class="essay-text">'+nl2br(e.question)+'</div>';
    h+='<div class="essay-conditions">📌 조건: '+esc(e.conditions)+'</div>';
    h+='<textarea class="essay-textarea" id="'+eid+'txt" placeholder="답안을 여기에 작성하세요..."></textarea>';
    h+='<br><button class="model-ans-btn" data-eid="'+eid+'" onclick="toggleModel(this)">모범답안 보기 / 숨기기</button>';
    h+='<div class="model-ans" id="'+eid+'ans"><strong>📝 모범답안</strong><br>'+nl2br(e.modelAnswer)+'</div>';
    h+='</div></div>';
  });
  h+='</div>';

  mc.innerHTML=h;
  mc.scrollTop=0;
}

function selectOpt(btn){
  var qid=btn.dataset.qid;
  var chosen=parseInt(btn.dataset.oi);
  var correct=parseInt(btn.dataset.correct);
  var pidx=parseInt(btn.dataset.pidx);
  var qi=parseInt(btn.dataset.qi);
  var n=passages[pidx].quiz[qi].options.length;
  for(var i=0;i<n;i++){
    var b=document.getElementById(qid+'opt'+i);
    if(b) b.disabled=true;
  }
  var cb=document.getElementById(qid+'opt'+chosen);
  var corb=document.getElementById(qid+'opt'+correct);
  if(chosen===correct){
    if(cb) cb.className+=' correct';
  } else {
    if(cb) cb.className+=' wrong';
    if(corb) corb.className+=' reveal';
  }
  var exp=document.getElementById(qid+'exp');
  if(exp) exp.style.display='block';
}

function resetQuiz(btn){
  var qid=btn.dataset.qid;
  var n=parseInt(btn.dataset.n);
  for(var i=0;i<n;i++){
    var b=document.getElementById(qid+'opt'+i);
    if(b){b.disabled=false;b.className=b.className.replace(/ correct| wrong| reveal/g,'');}
  }
  var exp=document.getElementById(qid+'exp');
  if(exp) exp.style.display='none';
}

function toggleModel(btn){
  var eid=btn.dataset.eid;
  var el=document.getElementById(eid+'ans');
  if(el) el.style.display=el.style.display==='block'?'none':'block';
}

</script>
